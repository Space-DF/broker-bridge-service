# Server Configuration
server:
  host: "0.0.0.0"
  port: 8080
  log_level: "info"
  read_timeout: "30s"
  write_timeout: "30s"

# EMQX MQTT Configuration
mqtt:
  broker_url: "tcp://emqx:1883"
  client_id: "broker-bridge-service"
  username: "admin"
  password: "public"
  topics:
    - "transformed/device/location"
    - "device/+/status"
  qos: 1
  clean_session: true
  keep_alive: 60
  connect_timeout: "10s"
  reconnect_delay: "5s"

# Rate Limiting Configuration
rate_limit:
  enabled: true
  requests_per_minute: 1000
  burst_size: 100